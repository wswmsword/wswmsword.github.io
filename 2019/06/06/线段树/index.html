</span><br><span class="line">int Mid(CNode *pRoot)</span><br><span class="line">&#123;</span><br><span class="line">   <span class="function"><span class="title">return</span> (pRoot-&gt;</span>L+<span class="function"><span class="title">pRoot</span>-&gt;</span>R)/<span class="number">2</span>;</span><br><span class="line">&#125;</span><br><span class="line">void BuildTree(CNode *pRoot,int L,int R)</span><br><span class="line">&#123;</span><br><span class="line">   <span class="function"><span class="title">pRoot</span>-&gt;</span>L=L;</span><br><span class="line">   <span class="function"><span class="title">pRoot</span>-&gt;</span>R=R;</span><br><span class="line">   <span class="function"><span class="title">pRoot</span>-&gt;</span>nSum=<span class="number">0</span>;</span><br><span class="line">   <span class="function"><span class="title">pRoot</span>-&gt;</span>Inc=<span class="number">0</span>;</span><br><span class="line">   <span class="keyword">if</span>(L==R)</span><br><span class="line">      return ;</span><br><span class="line">   nCount++;</span><br><span class="line">   <span class="function"><span class="title">pRoot</span>-&gt;</span>pLeft=Tree+nCount;</span><br><span class="line">   nCount++;</span><br><span class="line">   <span class="function"><span class="title">pRoot</span>-&gt;</span>pRight=Tree+nCount;</span><br><span class="line">   B<span class="function"><span class="title">uildTree</span>(pRoot-&gt;</span>pLeft,L,(L+R)/<span class="number">2</span>);</span><br><span class="line">   B<span class="function"><span class="title">uildTree</span>(pRoot-&gt;</span>pRight,(L+R)/<span class="number">2</span>+<span class="number">1</span>,R);</span><br><span class="line">&#125;</span><br><span class="line">void Insert(CNode *pRoot,int i,int v)</span><br><span class="line">&#123;</span><br><span class="line">   <span class="function"><span class="title">if</span>(pRoot-&gt;</span>L==<span class="function"><span class="title">i</span>&amp;&amp;pRoot-&gt;</span>R==i)</span><br><span class="line">   &#123;</span><br><span class="line">      <span class="function"><span class="title">pRoot</span>-&gt;</span>nSum=v;</span><br><span class="line">      return ;</span><br><span class="line">   &#125;</span><br><span class="line">   <span class="function"><span class="title">pRoot</span>-&gt;</span>nSum+=v;</span><br><span class="line">   <span class="keyword">if</span>(i&lt;=Mid(pRoot))</span><br><span class="line">      I<span class="function"><span class="title">nsert</span>(pRoot-&gt;</span>pLeft,i,v);</span><br><span class="line">   <span class="keyword">else</span></span><br><span class="line">      I<span class="function"><span class="title">nsert</span>(pRoot-&gt;</span>pRight,i,v);</span><br><span class="line">&#125;</span><br><span class="line">void Add(CNode *pRoot,int a,int b,long long c)</span><br><span class="line">&#123;</span><br><span class="line">   <span class="function"><span class="title">if</span>(pRoot-&gt;</span>L==<span class="function"><span class="title">a</span>&amp;&amp;pRoot-&gt;</span>R==b)</span><br><span class="line">   &#123;</span><br><span class="line">      <span class="function"><span class="title">pRoot</span>-&gt;</span>Inc+=c;</span><br><span class="line">      return ;</span><br><span class="line">   &#125;</span><br><span class="line">   <span class="function"><span class="title">pRoot</span>-&gt;</span>nSum+=c*(b-a+<span class="number">1</span>);</span><br><span class="line">   <span class="function"><span class="title">if</span>(b&lt;=(pRoot-&gt;</span>L+<span class="function"><span class="title">pRoot</span>-&gt;</span>R)/<span class="number">2</span>)</span><br><span class="line">      A<span class="function"><span class="title">dd</span>(pRoot-&gt;</span>pLeft,a,b,c);</span><br><span class="line">   <span class="function"><span class="title">else</span> <span class="keyword">if</span>(a&gt;=(pRoot-&gt;</span>L+<span class="function"><span class="title">pRoot</span>-&g ="line">   BuildTree(Tree,<span class="number">1</span>,n);</span><br><span class="line">   <span class="keyword">for</span>(i=<span class="number">1</span>;i&lt;=n;++i)</span><br><span class="line">   &#123;</span><br><span class="line">      scanf(<span class="string">"%d"</span>,&amp;a);</span><br><span class="line">      Insert(Tree,i,a);</span><br><span class="line">   &#125;</span><br><span class="line">   <span class="keyword">for</span>(i=<span class="number">0</span>;i&lt;q;++i)</span><br><span class="line">   &#123;</span><br><span class="line">      scanf(<span class="string">"%s"</span>,cmd);</span><br><span class="line">      <span class="keyword">if</span>(cmd[<span class="number">0</span>]==<span class="string">'C'</span>)</span><br><span class="line">      &#123;</span><br><span class="line">         scanf(<span class="string">"%d %d %d"</span>,&amp;a,&amp;b,&amp;c);</span><br><span class="line">         Add(Tree,a,b,c);</span><br><span class="line">      &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">         scanf(<span class="string">"%d %d"</span>,&amp;a,&amp;b);</span><br><span class="line">         printf(<span class="string">"%I64d\n"</span>,QuerySum(Tree,a,b));</span><br><span class="line">      &#125;</span><br><span class="line">   &#125;</span><br><span class="line">   return <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
